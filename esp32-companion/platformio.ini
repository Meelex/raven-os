[common]
platform    = espressif32
board       = esp32-s3-devkitc-1
framework   = arduino
monitor_speed  = 115200
upload_speed   = 921600
extra_scripts =
    pre:extra_scripts.py
    post:extra_scripts.py
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit BusIO@^1.16.1
    adafruit/Adafruit NeoPixel@^1.12.3
    bblanchon/ArduinoJson@^7.3.0

[env:raven]
extends = common
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEVICE_ID_DEFAULT='"companion_1"'
    -DCOMP_ID_DEFAULT='"raven"'

[env:griffin]
extends = common
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEVICE_ID_DEFAULT='"companion_3"'
    -DCOMP_ID_DEFAULT='"griffin"'

[env:scarab]
extends = common
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDEVICE_ID_DEFAULT='"companion_2"'
    -DCOMP_ID_DEFAULT='"scarab"'
